<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container {
            position: relative;
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
        }
        #videoFeed { width: 100%; height: auto; background: #000; }
        .metric-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .xr-active { border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .json-key { color: #94a3b8; font-weight: bold; }
        .json-val { color: #93c5fd; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-4 md:p-8">

<div class="max-w-6xl mx-auto space-y-6">
    <div class="flex justify-between items-end">
        <div id="status" class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-900 border border-slate-800">
            <span id="statusDot" class="w-3 h-3 rounded-full bg-red-500"></span>
            <span id="statusText" class="text-xs font-bold uppercase tracking-wider text-slate-300">Wait for Init</span>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="video-container border-2 border-slate-800">
                <video id="videoFeed" autoplay playsinline muted class="aspect-video"></video>
                <div class="absolute bottom-0 left-0 right-0 h-1 bg-slate-800">
                    <div id="audioBar" class="h-full bg-blue-500 w-0 transition-all duration-75"></div>
                </div>
            </div>

            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest px-1">Select Input Device</label>
                        <select id="cameraSelect" class="w-full bg-slate-800 text-white p-3 rounded-xl outline-none border border-slate-700 focus:border-blue-500 transition-all appearance-none cursor-pointer">
                            <option value="">--- Click INIT DEVICES first ---</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button id="initBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-900/20 uppercase tracking-tighter">
                            Init & Sync Devices
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="metric-card p-5 rounded-2xl space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-3 bg-slate-900/50 rounded-lg border border-slate-800 text-center">
                        <div class="text-[10px] text-slate-500 uppercase font-bold">Res</div>
                        <div id="m-res" class="text-lg font-mono font-bold text-blue-400">0x0</div>
                    </div>
                    <div class="p-3 bg-slate-900/50 rounded-lg border border-slate-800 text-center">
                        <div class="text-[10px] text-slate-500 uppercase font-bold">FPS</div>
                        <div id="m-fps" class="text-lg font-mono font-bold text-green-400">0</div>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="text-[10px] text-slate-500 uppercase font-bold px-1">Active Settings (getSettings)</div>
                    <div id="m-settings" class="text-[11px] font-mono bg-black/40 p-3 rounded-xl border border-slate-800 overflow-y-auto max-h-[120px]">
                        No active stream.
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="text-[10px] text-blue-500 uppercase font-bold px-1 tracking-widest">Hardware Capabilities</div>
                    <div id="m-caps" class="text-[11px] font-mono bg-black/40 p-3 rounded-xl border border-slate-800 overflow-y-auto max-h-[180px]">
                        Locked.
                    </div>
                </div>
            </div>

            <div id="xr-card" class="metric-card p-5 rounded-2xl space-y-4 border-l-4 border-l-slate-800">
                <div class="text-[10px] text-emerald-500 uppercase font-black px-1 tracking-widest">Spatial Analysis (WebXR)</div>
                <div class="space-y-1 text-[11px] font-mono">
                    <div class="flex justify-between py-1"><span>API:</span><span id="xr-supported" class="text-slate-400">?</span></div>
                    <div class="flex justify-between py-1"><span>AR Ready:</span><span id="xr-ar-ready" class="text-slate-400">?</span></div>
                    <div class="flex justify-between py-1"><span>Depth Sens:</span><span id="xr-depth" class="text-slate-400">?</span></div>
                </div>
                <button id="checkXrBtn" class="w-full py-3 bg-emerald-600/10 hover:bg-emerald-600/20 border border-emerald-500/30 text-emerald-500 text-[10px] font-black uppercase rounded-xl transition-all">
                    Run Depth Probe
                </button>
            </div>

            <button id="saveBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg uppercase tracking-tighter">
                Save Forensic Report
            </button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('videoFeed');
    const initBtn = document.getElementById('initBtn');
    const cameraSelect = document.getElementById('cameraSelect');
    const mRes = document.getElementById('m-res');
    const mFps = document.getElementById('m-fps');
    const mSettings = document.getElementById('m-settings');
    const mCaps = document.getElementById('m-caps');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    
    let currentStream;

    async function init() {
        try {
            statusText.textContent = "Requesting...";
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoInputs = devices.filter(d => d.kind === 'videoinput');

            cameraSelect.innerHTML = '';
            videoInputs.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.text = d.label || `Camera ${d.deviceId.slice(0,5)}`;
                cameraSelect.appendChild(opt);
            });

            stream.getTracks().forEach(t => t.stop());
            if (videoInputs.length > 0) start(videoInputs[0].deviceId);
            checkWebXR();
        } catch (e) { statusText.textContent = "Denied"; }
    }

    async function start(id) {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: { exact: id }, width: { ideal: 4096 } },
                audio: true
            });
            video.srcObject = currentStream;
            statusDot.className = "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]";
            setTimeout(updateAnalysis, 800);
        } catch (e) { statusText.textContent = "Stream Error"; }
    }

    function updateAnalysis() {
        if (!currentStream) return;
        const track = currentStream.getVideoTracks()[0];
        
        const settings = track.getSettings();
        mRes.textContent = `${settings.width}x${settings.height}`;
        mFps.textContent = Math.round(settings.frameRate || 0);
        mSettings.innerHTML = formatObject(settings);

        if (track.getCapabilities) {
            const caps = track.getCapabilities();
            mCaps.innerHTML = formatObject(caps);
        } else {
            mCaps.innerHTML = "<span class='text-red-400 italic'>Capabilities API not supported by this browser.</span>";
        }
    }

    function formatObject(obj) {
        return Object.entries(obj).map(([k, v]) => `
            <div class="flex justify-between border-b border-white/5 py-1">
                <span class="json-key text-[10px]">${k}</span>
                <span class="json-val text-right">${JSON.stringify(v)}</span>
            </div>`).join('');
    }

    async function checkWebXR() {
        if (!navigator.xr) {
            document.getElementById('xr-supported').textContent = "NO";
            return;
        }
        document.getElementById('xr-supported').textContent = "YES";
        const ar = await navigator.xr.isSessionSupported('immersive-ar');
        document.getElementById('xr-ar-ready').textContent = ar ? "YES" : "NO";
    }

    document.getElementById('checkXrBtn').addEventListener('click', async () => {
        const dEl = document.getElementById('xr-depth');
        dEl.textContent = "PROBING...";
        try {
            const session = await navigator.xr.requestSession('immersive-ar', {
                requiredFeatures: ['depth-sensing'],
                depthSensing: { usagePreference: ["cpu-optimized"], dataFormatPreference: ["luminance-alpha"] }
            });
            dEl.textContent = "VERIFIED";
            await session.end();
        } catch (e) { dEl.textContent = "NOT FOUND"; }
    });

    initBtn.addEventListener('click', init);
    cameraSelect.addEventListener('change', () => start(cameraSelect.value));
</script>
</body>
</html>
